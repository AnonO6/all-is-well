name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/all_is_well_ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret-minimum-32-characters
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      OPENAI_API_KEY_ONE: sk-ci-openai-placeholder
      OPENAI_MODEL: gpt-5-mini
      UNSPLASH_API_KEY: ci-unsplash-placeholder
      YOUTUBE_API_KEY_ONE: ci-youtube-placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: all_is_well_ci
          MYSQL_USER: ci
          MYSQL_PASSWORD: ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/all_is_well_ci
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-nextauth-secret-minimum-32-characters
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      OPENAI_API_KEY_ONE: sk-ci-openai-placeholder
      OPENAI_MODEL: gpt-5-mini
      UNSPLASH_API_KEY: ci-unsplash-placeholder
      YOUTUBE_API_KEY_ONE: ci-youtube-placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Build app
        run: npm run build

      - name: Start server
        run: |
          npm run start -- -H 127.0.0.1 -p 3000 &
          echo $! > /tmp/all-is-well-server.pid

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:3000/" > /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run E2E smoke tests
        run: BASE_URL=http://127.0.0.1:3000 npm run test:e2e

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/all-is-well-server.pid ]; then
            kill "$(cat /tmp/all-is-well-server.pid)" || true
          fi
